name: technolog-pipeline_apply-repo-config

on:
  workflow_call:
    inputs:
      config_path:
        description: "Path to the repo config tfvars file in the caller repository."
        type: string
        required: false
        default: ".github/repo_config.tfvars"
      module_ref:
        description: "Optional ref for the GitHub-Technolog-Pipeline-Repo-Control module checkout."
        type: string
        required: false
        default: ""
      repo_name:
        description: "Override the repository name (defaults to caller repo)."
        type: string
        required: false
        default: ""
      organization:
        description: "Override the GitHub organization (defaults to caller owner)."
        type: string
        required: false
        default: ""
      repo_id:
        description: "Override the repository ID used for state key."
        type: string
        required: false
        default: ""
      state_key:
        description: "Override the Terraform state key."
        type: string
        required: false
        default: ""
      aws_region:
        description: "AWS region for the state bucket."
        type: string
        required: false
        default: "eu-west-1"
      aws_role_arn:
        description: "AWS role ARN for state access (falls back to vars.AWS_STATE_ROLE_ARN)."
        type: string
        required: false
        default: ""
      terraform_version:
        description: "Terraform version to install."
        type: string
        required: false
        default: "1.7.5"
      apply:
        description: "When true, apply the plan. When false, only plan."
        type: boolean
        required: false
        default: false
    secrets:
      GNM_APP_ID:
        required: true
      GNM_APP_INSTALLATION_ID:
        required: true
      GNM_APP_PRIVATE_KEY:
        required: true
      STATE_BUCKET_NAME:
        required: true
      STATE_KMS_KEY:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: Apply Repo Config
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
    steps:
      - name: Generate GitHub App Token
        id: app_token
        shell: bash
        env:
          APP_ID: ${{ secrets.GNM_APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.GNM_APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.GNM_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APP_ID:-}" ] || [ -z "${APP_INSTALLATION_ID:-}" ] || [ -z "${APP_PRIVATE_KEY:-}" ]; then
            echo "Missing app credentials (GNM_APP_ID, GNM_APP_INSTALLATION_ID, GNM_APP_PRIVATE_KEY)." >&2
            exit 1
          fi
          pem_file=$(mktemp)
          trap 'rm -f "$pem_file"' EXIT
          printf '%s' "$APP_PRIVATE_KEY" > "$pem_file"
          iat=$(date +%s)
          exp=$((iat + 540))
          header=$(printf '{"alg":"RS256","typ":"JWT"}' | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$iat" "$exp" "$APP_ID" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          unsigned="$header.$payload"
          signature=$(printf '%s' "$unsigned" | openssl dgst -sha256 -sign "$pem_file" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          jwt="$unsigned.$signature"
          token=$(curl -sS -X POST -H "Authorization: Bearer $jwt" -H "Accept: application/vnd.github+json" "https://api.github.com/app/installations/${APP_INSTALLATION_ID}/access_tokens" | jq -r '.token')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "Failed to generate installation token." >&2
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Resolve Inputs
        id: resolve
        shell: bash
        env:
          INPUT_REPO_NAME: ${{ inputs.repo_name }}
          INPUT_ORG: ${{ inputs.organization }}
          INPUT_REPO_ID: ${{ inputs.repo_id }}
          INPUT_STATE_KEY: ${{ inputs.state_key }}
          INPUT_CONFIG_PATH: ${{ inputs.config_path }}
          INPUT_MODULE_REF: ${{ inputs.module_ref }}
          INPUT_AWS_REGION: ${{ inputs.aws_region }}
          INPUT_AWS_ROLE_ARN: ${{ inputs.aws_role_arn }}
          DEFAULT_AWS_REGION: ${{ vars.AWS_REGION }}
          DEFAULT_AWS_ROLE_ARN: ${{ vars.AWS_STATE_ROLE_ARN }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          DEFAULT_REPO_ID: ${{ github.repository_id }}
        run: |
          set -euo pipefail

          repo_name="${INPUT_REPO_NAME}"
          if [ -z "$repo_name" ]; then
            repo_name="${GITHUB_REPOSITORY##*/}"
          fi

          organization="${INPUT_ORG}"
          if [ -z "$organization" ]; then
            organization="${GITHUB_REPOSITORY_OWNER}"
          fi

          repo_id="${INPUT_REPO_ID}"
          if [ -z "$repo_id" ]; then
            repo_id="${DEFAULT_REPO_ID}"
          fi

          state_key="${INPUT_STATE_KEY}"
          if [ -z "$state_key" ]; then
            state_key="state/repo/${repo_id}/terraform.state"
          fi

          aws_region="${INPUT_AWS_REGION}"
          if [ -z "$aws_region" ]; then
            aws_region="${DEFAULT_AWS_REGION}"
          fi
          if [ -z "$aws_region" ]; then
            aws_region="eu-west-1"
          fi

          aws_role_arn="${INPUT_AWS_ROLE_ARN}"
          if [ -z "$aws_role_arn" ]; then
            aws_role_arn="${DEFAULT_AWS_ROLE_ARN}"
          fi
          if [ -z "$aws_role_arn" ]; then
            echo "Missing AWS role ARN (inputs.aws_role_arn or vars.AWS_STATE_ROLE_ARN)." >&2
            exit 1
          fi

          module_repo=""
          module_ref=""
          if [ -n "${WORKFLOW_REF}" ]; then
            module_repo="${WORKFLOW_REF%%/.github/workflows/*}"
            module_ref="${WORKFLOW_REF##*@}"
          fi
          if [ -n "${INPUT_MODULE_REF}" ]; then
            module_ref="${INPUT_MODULE_REF}"
          fi
          if [ -z "$module_repo" ]; then
            module_repo="Technolog-Ltd/GitHub-Technolog-Pipeline-Repository"
          fi
          if [ -z "$module_ref" ]; then
            module_ref="main"
          fi

          config_path="${INPUT_CONFIG_PATH}"
          config_file="repo/${config_path}"
          module_config_file="../${config_file}"

          {
            echo "repo_name=$repo_name"
            echo "organization=$organization"
            echo "repo_id=$repo_id"
            echo "state_key=$state_key"
            echo "aws_region=$aws_region"
            echo "aws_role_arn=$aws_role_arn"
            echo "module_repo=$module_repo"
            echo "module_ref=$module_ref"
            echo "config_file=$config_file"
            echo "module_config_file=$module_config_file"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout Caller Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: repo
          fetch-depth: 0

      - name: Checkout Module Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ steps.resolve.outputs.module_repo }}
          ref: ${{ steps.resolve.outputs.module_ref }}
          path: module
          token: ${{ steps.app_token.outputs.token }}

      - name: Verify Config File
        shell: bash
        run: |
          set -euo pipefail
          config_file="${{ steps.resolve.outputs.config_file }}"
          if [ ! -f "$config_file" ]; then
            echo "Config file not found: $config_file" >&2
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ steps.resolve.outputs.aws_role_arn }}
          aws-region: ${{ steps.resolve.outputs.aws_region }}
          role-session-name: technolog-pipeline-repo-config

      - name: Terraform Plan
        uses: Technolog-Ltd/ActionLib-Terraform-Control@v1.0.0
        env:
          TF_VAR_name: ${{ steps.resolve.outputs.repo_name }}
          TF_VAR_organization: ${{ steps.resolve.outputs.organization }}
          TF_VAR_state_bucket_name: ${{ secrets.STATE_BUCKET_NAME }}
          TF_VAR_github_token: ${{ steps.app_token.outputs.token }}
        with:
          working-directory: module
          terraform-version: ${{ inputs.terraform_version }}
          init-args: >-
            -backend-config="bucket=${{ secrets.STATE_BUCKET_NAME }}"
            -backend-config="key=${{ steps.resolve.outputs.state_key }}"
            -backend-config="region=${{ steps.resolve.outputs.aws_region }}"
            -backend-config="encrypt=true"
            ${{ secrets.STATE_KMS_KEY && format('-backend-config="kms_key_id={0}"', secrets.STATE_KMS_KEY) || '' }}
          plan-args: -var-file="${{ steps.resolve.outputs.module_config_file }}"

      - name: Terraform Apply
        if: ${{ inputs.apply }}
        uses: Technolog-Ltd/ActionLib-Terraform-Control@v1.0.0
        env:
          TF_VAR_name: ${{ steps.resolve.outputs.repo_name }}
          TF_VAR_organization: ${{ steps.resolve.outputs.organization }}
          TF_VAR_state_bucket_name: ${{ secrets.STATE_BUCKET_NAME }}
          TF_VAR_github_token: ${{ steps.app_token.outputs.token }}
        with:
          working-directory: module
          terraform-version: ${{ inputs.terraform_version }}
          init-args: >-
            -backend-config="bucket=${{ secrets.STATE_BUCKET_NAME }}"
            -backend-config="key=${{ steps.resolve.outputs.state_key }}"
            -backend-config="region=${{ steps.resolve.outputs.aws_region }}"
            -backend-config="encrypt=true"
            ${{ secrets.STATE_KMS_KEY && format('-backend-config="kms_key_id={0}"', secrets.STATE_KMS_KEY) || '' }}
          command: apply
          auto-approve: "true"
          apply-args: -var-file="${{ steps.resolve.outputs.module_config_file }}"
